services:
  cineboard:
    build:
      context: .
      args:
        # Pulled from the shell environment or a .env file next to this compose file.
        VITE_TMDB_READ_TOKEN: ${VITE_TMDB_READ_TOKEN}
    image: cineboard:latest
    container_name: cineboard
    ports:
      - "8080:80"
    restart: unless-stopped
